<!DOCTYPE html><html>    <head>        <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">             <title>Page Title</title>    </head>    <body>        <br><br>        <form action="./" name="sample-form">            <input type="file" name="file" class="validate_ext" />        </form>    </body></html> <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script><script type="text/javascript">    $(function () {        $.fn.hasExtension = function (exts) {            return (new RegExp('(' + exts.join('|').replace(/\./g, '\\.') + ')$')).test($(this).val().toLowerCase());        };        $.fn.extend({            // With every keystroke capitalize first letter of ALL words in the text            upperFirstAll: function () {                $(this).keyup(function (event) {                    var box = event.target;                    var txt = $(this).val();                    var start = box.selectionStart;                    var end = box.selectionEnd;                    $(this).val(txt.toLowerCase().replace(/^(.)|(\s|\-)(.)/g,                            function (c) {                                return c.toUpperCase();                            }));                    box.setSelectionRange(start, end);                });                return this;            },            // With every keystroke capitalize first letter of the FIRST word in the text            upperFirst: function () {                $(this).keyup(function (event) {                    var box = event.target;                    var txt = $(this).val();                    var start = box.selectionStart;                    var end = box.selectionEnd;                    $(this).val(txt.replace(/^(.)/g,                            function (c) {                                return c.toUpperCase();                            }));                    box.setSelectionRange(start, end);                });                return this;            },            // Converts with every keystroke the hole text to lowercase            lowerCase: function () {                $(this).keyup(function (event) {                    var box = event.target;                    var txt = $(this).val();                    var start = box.selectionStart;                    var end = box.selectionEnd;                    $(this).val(txt.toLowerCase());                    box.setSelectionRange(start, end);                });                return this;            },            // Converts with every keystroke the hole text to uppercase            upperCase: function () {                $(this).keyup(function (event) {                    var box = event.target;                    var txt = $(this).val();                    var start = box.selectionStart;                    var end = box.selectionEnd;                    $(this).val(txt.toUpperCase());                    box.setSelectionRange(start, end);                });                return this;            }        });        // usage section        $('.validate_ext').on("change", function () {            // 'png,gif,jpeg,pjpeg,jpg,x-png,bmp,doc,docx,xls,xlsx,pdf,ppt,pptx';            var extension = ['xls', 'xlsx'];            if (!$(this).hasExtension(extension)) {                alert('file extension is not correct!!!');                $(this).val('');            }        });        $('.firstUpper').live("keyup", function () {            $(this).upperFirst();        });        $('.emailKeyupCheck').on('keyup', function () {            var valid = /^([\w-\.]+@([\w-]+\.)+[\w-]{2,4})?$/.test(this.value);            if (valid || this.value.length == 0) {                $(this).parent().parent().removeClass('error');                $(this).removeClass('error');                $('#emailErrorMsg').empty();            } else {                $(this).addClass('error');                $(this).parent().parent().addClass('error');                $('#emailErrorMsg').empty().html('Email address is not correct!').css('color', '#bb2413');            }        });        $(document).on('keyup', '.stringNumber', function () {            var valid = /^[a-zA-Z0-9А-Яа-яӨөҮүЁё]+$/.test(this.value);            if (valid || this.value.length == 0) {                $(this).removeClass('error');            } else {                $(this).val('');                $(this).addClass('error');            }        });        $(document).on('keyup', '.onlyString', function () {            var valid = /^[a-zA-ZА-Яа-яӨөҮүЁё]+$/.test(this.value);            if (valid || this.value.length == 0) {                $(this).removeClass('error');            } else {                $(this).val('');                $(this).addClass('error');            }        });        $(document).on('keyup', '.onlyNumber', function () {            var valid = /^[0-9]+$/.test(this.value);            if (valid || this.value.length == 0) {                $(this).removeClass('error');            } else {                $(this).val('');                $(this).addClass('error');            }        });    });</script>
